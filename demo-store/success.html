<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — GadgetStore Ltd.</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #4ADE80;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --font: 'Plus Jakarta Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .card { background: var(--surface); border-radius: 32px; padding: 60px 40px; text-align: center; max-width: 480px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .success-icon { width: 80px; height: 80px; background: #ecfdf5; color: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 32px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        p { color: var(--muted); margin-bottom: 40px; font-size: 16px; line-height: 1.6; }
        .btn { display: inline-block; padding: 16px 32px; background: #0f172a; color: white; border-radius: 100px; font-weight: 700; text-decoration: none; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card">
    <div class="success-icon">✓</div>
    <h1>Payment Received!</h1>
    <p>Thank you for your purchase. Your <strong>Nexus One Headset</strong> is being prepared for shipping. You'll receive a confirmation email shortly.</p>
    <a href="index.html" class="btn">Return to Store</a>
</div>

</body>
</html>
