<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Demo — NexusPay Merchant Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--brand);
            border-radius: 8px;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            gap: 40px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }

        .product-img {
            width: 400px;
            height: 400px;
            background: #EEF2FF;
            border-radius: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #EEF2FF;
            color: var(--brand);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
        }

        .desc {
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--brand);
        }

        .buy-btn {
            width: 100%;
            padding: 16px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .footer a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 700;">Redirecting to NexusPay...</div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-box"></div> GadgetStore Ltd.
            </div>
            <div style="font-size: 14px; color: var(--muted);">Demo Merchant Page</div>
        </div>

        <div class="product-card">
            <div class="product-img" id="product-container">
                <!-- Image will be injected from server -->
                <img src="./nexus_one.png" alt="Nexus One Headset" />
            </div>
            <div class="product-info">
                <div class="badge">FEATURED PRODUCT</div>
                <h1>Nexus One — High Resolution Headset</h1>
                <div class="price">₹10.00</div>
                <p class="desc">Experience studio-quality sound with our premium active noise-cancelling headphones.
                    Built for the modern audiophile.</p>

                <form id="checkout-form">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="cust-name" value="Jane Doe" required />
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="cust-email" value="jane@example.com" required />
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="cust-phone" value="+919999999999" required />
                    </div>
                    <button type="submit" class="buy-btn" id="buy-btn">Buy Now &middot; ₹10</button>
                </form>
            </div>
        </div>

        <div class="footer">
            This is a merchant integration demo. <a href="../dashboard/index.html">Back to Dashboard</a>
        </div>
    </div>

    <script>
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('buy-btn');
            const overlay = document.getElementById('loading-overlay');

            btn.disabled = true;
            btn.textContent = 'Processing...';
            overlay.style.display = 'flex';

            try {
                const res = await fetch('/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerName: document.getElementById('cust-name').value,
                        customerEmail: document.getElementById('cust-email').value,
                        customerPhone: document.getElementById('cust-phone').value,
                        total: 10
                    })
                });
                const data = await res.json();
                if (data.gateway_url) {
                    window.location.href = data.gateway_url;
                } else {
                    throw new Error(data.error || 'Checkout failed');
                }
            } catch (err) {
                alert('Error: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Buy Now &middot; ₹10';
                overlay.style.display = 'none';
            }
        });
    </script>

</body>

</html>
