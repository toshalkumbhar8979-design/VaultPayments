<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — NexusPay</title>
  <link rel="stylesheet" href="./assets/css/np-global.css"/>
</head>
<body>
<div class="np-auth-wrap">
  <div class="np-auth-card">

    <div class="np-auth-logo">
      <div class="np-nav-logo-mark" style="width:40px;height:40px;border-radius:11px;">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z"/><path d="M12 22V12M3 7l9 5 9-5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg>
      </div>
      <span class="np-nav-logo-text">NexusPay</span>
    </div>

    <h2 class="np-auth-title">Welcome back</h2>
    <p class="np-auth-sub">Sign in to your merchant dashboard</p>

    <div id="alert" class="np-alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label>Business Email <span class="req">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="you@yourbusiness.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label>Password <span class="req">*</span></label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-control" placeholder="Your password" autocomplete="current-password" required style="padding-right:48px;"/>
          <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;" id="eye-btn">👁</button>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:-8px;margin-bottom:16px;">
        <a href="./forgot-password.html" style="font-size:13px;color:var(--brand);">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Sign In →
      </button>
    </form>

    <p style="text-align:center;font-size:14px;color:var(--muted);margin-top:24px;">
      New to NexusPay?
      <a href="./signup.html" style="font-weight:700;">Create free account →</a>
    </p>
  </div>
</div>

<script src="./config.js"></script>
<script src="./assets/js/np-utils.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  const alertEl  = document.getElementById('alert');

  UI.clearAlert(alertEl);
  UI.setLoading(btn, true, 'Signing in...');

  try {
    const data = await VP.post('/auth/login', { email, password });

    // Store auth state
    VP.token    = data.token;
    VP.merchant = data.merchant;

    // Redirect to intended page or dashboard
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || './dashboard/index.html';

  } catch (err) {
    UI.alert(alertEl, 'error', err.message || 'Invalid email or password');
    UI.setLoading(btn, false);
  }
});

function togglePassword() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Redirect if already logged in
if (VP.isLoggedIn) {
  window.location.href = './dashboard/index.html';
}
</script>
</body>
</html>
