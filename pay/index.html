<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Pay Securely</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --brand: #5b4fff;
            --brand-dark: #483dff;
            --font: 'Plus Jakarta Sans', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
        }

        body {
            font-family: var(--font);
            background: #f4f4f5;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
        }

        /* ── Loading ─────────────── */
        #loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        .spinner {
            width: 32px;
            height: 32px;
            position: relative;
        }

        .spinner::before,
        .spinner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid;
            border-color: #000 transparent transparent transparent;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .spinner::after {
            border-color: transparent transparent #000 transparent;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* ── Centered Modal Layout ── */
        .checkout-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
        }

        .checkout-card {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .1);
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        .c-header {
            background: var(--brand);
            padding: 32px 40px;
            color: white;
            text-align: center;
        }

        .c-body {
            padding: 32px 40px;
        }

        .biz-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 56px;
            position: relative;
            z-index: 1;
        }

        .biz-logo {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            overflow: hidden;
            flex-shrink: 0;
        }

        .biz-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .biz-name {
            font-size: 18px;
            font-weight: 800;
        }

        .biz-type {
            font-size: 13px;
            opacity: .7;
            margin-top: 2px;
        }

        .amount-block {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .amount-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: .65;
            margin-bottom: 10px;
        }

        .amount-val {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .amount-desc {
            font-size: 15px;
            opacity: .75;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .order-info {
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: auto;
        }

        .oi-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            font-size: 13px;
        }

        .oi-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .oi-label {
            opacity: .65;
        }

        .oi-val {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
        }

        .sec-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .sec-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ── Right Panel ─────────── */
        .right {
            background: #ffffff;
            padding: 56px 56px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .powered-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 32px;
        }

        .powered {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: #fafafa;
            border: 1px solid #e4e4e7;
            border-radius: 100px;
            padding: 6px 14px;
            transition: all .2s;
        }

        .powered:hover {
            background: #f4f4f5;
            border-color: #d4d4d8;
        }

        .powered-icon {
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .powered-icon svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .powered span {
            font-size: 12px;
            color: #71717a;
            font-weight: 600;
        }

        .powered strong {
            color: #000;
        }

        /* ── Tabs ─────────────────── */
        .tabs {
            display: flex;
            background: #f4f4f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            color: #71717a;
            cursor: pointer;
            transition: all .3s;
            background: none;
        }

        .tab.active {
            background: white;
            color: #000;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
        }

        /* ── QR Panel ─────────────── */
        #tab-qr {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .qr-wrap {
            border: 2px solid #e5e7eb;
            border-radius: 18px;
            padding: 14px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .06);
            position: relative;
            transition: transform .3s;
        }

        .qr-wrap:hover {
            transform: scale(1.02);
        }

        .qr-wrap img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            display: block;
        }

        .qr-tag {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--brand);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 14px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: .5px;
        }

        .app-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .app-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

        .app-pill:hover {
            border-color: var(--brand);
            color: var(--brand);
            background: #f0f0ff;
        }

        .qr-help {
            text-align: center;
        }

        .qr-help h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .qr-help p {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
        }

        .timer-bar {
            width: 100%;
            background: #f3f4f6;
            border-radius: 20px;
            height: 5px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand), #8b5cf6);
            border-radius: 20px;
            transition: width 1s linear;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .timer-countdown {
            color: var(--brand);
            font-weight: 700;
            font-family: var(--mono);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9ca3af;
            font-size: 12px;
            width: 100%;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        /* ── SMS Panel ─────────────── */
        #tab-sms {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        #tab-sms.active {
            display: flex;
        }

        .sms-label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .sms-textarea,
        .sms-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-family: var(--mono);
            font-size: 13px;
            resize: vertical;
            outline: none;
            transition: border .2s;
            background: #fafafa;
        }

        .sms-textarea {
            min-height: 90px;
        }

        .sms-textarea:focus,
        .sms-input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(91, 79, 255, .1);
            background: white;
        }

        .sms-result {
            border-radius: 10px;
            padding: 14px 16px;
            display: none;
            margin-top: 4px;
        }

        .sms-result.show {
            display: block;
        }

        .sms-kv {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 0, 0, .05);
        }

        .sms-kv:last-child {
            border: none;
        }

        .sms-kv .k {
            color: #6b7280;
        }

        .sms-kv .v {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
        }

        /* ── Buttons ─────────────── */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-brand {
            background: var(--brand);
            color: white;
            box-shadow: 0 4px 18px rgba(91, 79, 255, .35);
        }

        .btn-brand:hover:not(:disabled) {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91, 79, 255, .45);
        }

        .btn-ghost-v {
            background: transparent;
            border: 1.5px solid #e5e7eb;
            color: #6b7280;
        }

        .btn-ghost-v:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        /* ── Success Screen ──────── */
        #success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            padding: 20px 0;
        }

        #success-screen.show {
            display: flex;
        }

        .success-check {
            width: 72px;
            height: 72px;
            background: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop .5s cubic-bezier(.34, 1.56, .64, 1);
        }

        .success-check svg {
            width: 34px;
            height: 34px;
            stroke: #065f46;
            fill: none;
            stroke-width: 3;
        }

        @keyframes pop {
            from {
                transform: scale(0);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .receipt-mini {
            width: 100%;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px 20px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }

        .receipt-row:last-child {
            border: none;
        }

        .rl {
            color: #6b7280;
        }

        .rv {
            font-weight: 700;
            font-family: var(--mono);
            font-size: 12px;
        }

        /* ── Error Screen ────────── */
        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            gap: 12px;
        }

        #error-screen.show {
            display: flex;
        }

        /* ── Responsive ──────────── */
        @media(max-width:768px) {
            .checkout {
                grid-template-columns: 1fr;
            }

            .left {
                padding: 32px 24px;
            }

            .amount-val {
                font-size: 40px;
            }

            .right {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>

    <script src="../assets/js/gsap/gsap.min.js"></script>
    <script src="../assets/js/gsap/SplitText.min.js"></script>
    <script src="../assets/js/gsap/CustomEase.min.js"></script>

    <div id="loading">
        <div class="spinner"></div>
    </div>

    <div class="checkout-wrap" id="checkout-wrap">
        <div class="checkout-card">
            <header class="c-header">
                <div class="biz-logo" id="biz-logo">V</div>
                <h1 id="biz-name">Business Name</h1>
                <p id="biz-type">Secure Payment</p>
            </header>

            <div class="c-body">
                <div style="text-align:center;margin-bottom:32px;">
                    <div id="amount-val" style="font-size:44px;font-weight:900;letter-spacing:-2px;color:var(--brand);">₹0.00</div>
                    <div id="left-pid" style="font-size:11px;color:#9ca3af;margin-top:8px;font-family:var(--mono);">pay_...</div>
                </div>

                <div class="tabs" id="pay-tabs">
                    <button class="tab active" onclick="switchTab('qr', this)">Scan UPI QR</button>
                    <button class="tab" onclick="switchTab('sms', this)">Verify SMS</button>
                </div>

                <div id="tab-qr" style="display:flex;flex-direction:column;align-items:center;">
                    <div class="qr-wrap">
                        <img id="qr-img" src="" alt="UPI QR" />
                        <div class="qr-tag">UPI DYNAMIC QR</div>
                    </div>
                </div>

                <div id="tab-sms" style="display:none;flex-direction:column;gap:16px;">
                    <textarea id="sms-input" class="sms-textarea" placeholder="Paste bank SMS..."></textarea>
                    <button class="btn btn-brand" onclick="verifySMS()" id="sms-btn">Verify SMS</button>
                    <div id="sms-result" class="sms-result">
                        <h4 id="sms-result-title"></h4>
                        <div id="sms-result-rows"></div>
                    </div>
                </div>

                <div id="success-screen">
                    <div class="success-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <h2 style="font-size:24px;font-weight:900;margin-top:16px;">Success! 🎉</h2>
                    <div class="receipt-mini">
                        <div class="receipt-row"><span class="rl">Amount</span><span class="rv" id="s-amount">—</span></div>
                        <div class="receipt-row"><span class="rl">Payment ID</span><span class="rv" id="s-pid" style="font-size:11px;">—</span></div>
                    </div>
                    <button class="btn btn-brand" id="continue-btn" style="display:none;margin-top:16px;">Continue →</button>
                </div>

                <div id="error-screen">
                    <div style="font-size:48px;">❌</div>
                    <h2 style="font-size:20px;font-weight:800;" id="error-title">Error</h2>
                    <p id="error-msg"></p>
                </div>

                <div class="p-footer">
                    <span style="font-size:11px;color:#9ca3af;">Secured by <strong style="color:var(--brand);">VaultPayments</strong></span>
                </div>
            </div>
        </div>
    </div>



        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        const API = window.NEXUSPAY_API_URL || '';
        let paymentData = null;
        let timerInterval = null;
        let pollInterval = null;

        // ── Bootstrap ──────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(location.search);
            const pid = params.get('id');

            if (!pid) { showError('Invalid Link', 'No payment ID found in URL.'); return; }

            try {
                const res = await fetch(`${API}/payments/checkout/${pid}`);
                const json = await res.json();

                if (!json.success) {
                    showError(json.error?.code === 'PAYMENT_EXPIRED' ? 'Link Expired' : 'Payment Not Found', json.error?.message || 'This payment link is no longer valid.');
                    return;
                }

                paymentData = json.data;
                renderPayment(paymentData);

                // GSAP Premium Reveal Animation
                gsap.registerPlugin(SplitText, CustomEase);
                CustomEase.create("impact", "M0,0 C0.12,0.85 0.45,1.15 1,1");

                const amountSplit = new SplitText("#amount-val", { type: "chars,words" });
                const bizSplit = new SplitText("#biz-name", { type: "chars,words" });

                const tl = gsap.timeline();
                tl.to("#loading", { opacity: 0, duration: 0.5, ease: "power2.inOut", onComplete: () => document.getElementById('loading').style.display = 'none' })
                    .to("#checkout-wrap", { opacity: 1, duration: 0.1 }, "-=0.2")
                    .fromTo(".left", { x: "-100%" }, { x: "0%", duration: 1, ease: "impact" }, "-=0.1")
                    .fromTo(".right", { opacity: 0, x: 50 }, { opacity: 1, x: 0, duration: 1, ease: "power3.out" }, "-=0.7")
                    .fromTo(bizSplit.chars, { opacity: 0, y: 10, rotationX: -90 }, { opacity: 1, y: 0, rotationX: 0, duration: 0.6, stagger: 0.03, ease: "power2.out" }, "-=0.6")
                    .fromTo(amountSplit.chars, { opacity: 0, y: 30, rotationX: -90 }, { opacity: 1, y: 0, rotationX: 0, duration: 0.8, stagger: 0.05, ease: "impact" }, "-=0.8")
                    .fromTo(".amount-label, .amount-desc, .order-info, .sec-badges", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, stagger: 0.1, ease: "power2.out" }, "-=0.6")
                    .fromTo(".tabs, .qr-wrap, .app-pills, .qr-help, .timer-bar", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, stagger: 0.1, ease: "power2.out" }, "-=0.8");

                startTimer();
                pollInterval = setInterval(checkStatus, 6000);

            } catch (err) {
                showError('Connection Error', 'Could not load payment details. Please try again.');
                console.error(err);
            }
        });

        function renderPayment(p) {
            const color = p.merchant.brand_color || '#5b4fff';
            document.documentElement.style.setProperty('--brand', color);
            document.documentElement.style.setProperty('--brand-dark', shadeColor(color, -20));

            // Left panel
            document.getElementById('biz-name').textContent = p.merchant.name;
            document.getElementById('biz-initial').textContent = p.merchant.name.charAt(0).toUpperCase();
            document.getElementById('amount-val').textContent = p.amount_formatted;
            document.getElementById('amount-desc').textContent = p.description || 'Payment Request';
            document.getElementById('left-pid').textContent = p.payment_id.substring(0, 20) + '...';
            document.getElementById('left-customer').textContent = p.customer?.name || '—';
            document.getElementById('left-currency').textContent = `${p.currency} (${p.currency_symbol})`;

            // Logo
            if (p.merchant.logo_url) {
                document.getElementById('biz-logo').innerHTML = `<img src="${p.merchant.logo_url}" alt="logo" onerror="this.parentElement.innerHTML='<span>${p.merchant.name.charAt(0).toUpperCase()}</span>'" />`;
            }

            // QR
            document.getElementById('qr-img').src = p.qr_code;

            // Success screen prep
            document.getElementById('s-amount').textContent = p.amount_formatted;
            document.getElementById('s-pid').textContent = p.payment_id;
        }

        // ── Timer ──────────────────────────────────────────────────────────────────
        function startTimer() {
            const expiresAt = new Date(paymentData.expires_at);
            const totalMs = expiresAt - new Date(paymentData.created_at || Date.now() - 3600000);

            function tick() {
                const diff = expiresAt - Date.now();
                if (diff <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-text').textContent = 'EXPIRED';
                    document.getElementById('timer-fill').style.width = '0%';
                    document.getElementById('timer-fill').style.background = '#ef4444';
                    return;
                }
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-text').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                const pct = Math.max(0, (diff / (totalMs || 3600000)) * 100);
                document.getElementById('timer-fill').style.width = pct + '%';
                if (pct < 20) document.getElementById('timer-fill').style.background = '#ef4444';
            }
            tick();
            timerInterval = setInterval(tick, 1000);
        }

        // ── Tab Switch ─────────────────────────────────────────────────────────────
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById('tab-qr').style.display = tab === 'qr' ? 'flex' : 'none';
            document.getElementById('tab-sms').style.display = tab === 'sms' ? 'flex' : 'none';
        }

        // ── SMS Verify ─────────────────────────────────────────────────────────────
        async function verifySMS() {
            const sms = document.getElementById('sms-input').value.trim();
            const btn = document.getElementById('sms-btn');
            if (!sms) return;

            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const res = await fetch(`${API}/sms/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sms, payment_id: paymentData?.payment_id }),
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.error?.message);

                const { parsed, action_taken } = json.data;
                const resultEl = document.getElementById('sms-result');
                const isOk = ['captured', 'auto_captured', 'already_processed'].includes(action_taken);

                resultEl.style.display = 'block';
                resultEl.style.background = isOk ? '#d1fae5' : parsed.amount ? '#fef3c7' : '#fee2e2';
                resultEl.style.border = `1px solid ${isOk ? '#a7f3d0' : parsed.amount ? '#fde68a' : '#fecaca'}`;

                document.getElementById('sms-result-title').textContent = isOk ? '✅ Payment Confirmed!' : parsed.amount ? '⚠ Amount Detected' : '❌ No Payment Found';
                document.getElementById('sms-result-rows').innerHTML = [
                    ['Amount', parsed.amount ? `₹${parsed.amount}` : 'Not found'],
                    ['Txn Ref', parsed.transaction_id || '—'],
                    ['Bank', parsed.bank || 'Unknown'],
                    ['Action', action_taken || 'none'],
                ].map(([k, v]) => `<div class="sms-kv"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');

                if (isOk) setTimeout(showSuccess, 1000);

            } catch (err) {
                const r = document.getElementById('sms-result');
                r.style.display = 'block';
                r.style.background = '#fee2e2';
                r.style.border = '1px solid #fecaca';
                document.getElementById('sms-result-title').textContent = '❌ Verification Failed';
                document.getElementById('sms-result-rows').innerHTML = `<div class="sms-kv"><span class="k">Error</span><span class="v">${err.message}</span></div>`;
            }

            btn.disabled = false;
            btn.textContent = 'Verify Payment';
        }

        // ── Poll Status ────────────────────────────────────────────────────────────
        async function checkStatus(isManual = false) {
            if (!paymentData?.payment_id) return;
            const verifyBtn = document.getElementById('verify-btn');
            
            if (isManual) {
                verifyBtn.disabled = true;
                verifyBtn.textContent = 'Verifying...';
            }

            try {
                // We call the standard public checkout endpoint.
                // It has been updated to trigger an internal sync with the connector.
                const res = await fetch(`${API}/payments/checkout/${paymentData.payment_id}`);
                const json = await res.json();
                
                if (json.success && json.data.status === 'captured') {
                    clearInterval(pollInterval);
                    showSuccess();
                    return;
                }

                if (isManual) {
                    // If manual check didn't find a capture yet, provide feedback
                    setTimeout(() => {
                        verifyBtn.disabled = false;
                        verifyBtn.textContent = "I've Paid — Verify Now";
                    }, 500);
                }
            } catch (err) { 
                console.error('Check status error:', err);
                if (isManual) {
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = "I've Paid — Verify Now";
                }
            }
        }

        // ── Show Success ───────────────────────────────────────────────────────────
        function showSuccess() {
            clearInterval(timerInterval);
            clearInterval(pollInterval);

            document.getElementById('pay-tabs').style.display = 'none';
            document.getElementById('tab-qr').style.display = 'none';
            document.getElementById('tab-sms').style.display = 'none';
            document.getElementById('success-screen').classList.add('show');

            document.getElementById('s-time').textContent = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

            if (paymentData?.redirect_url) {
                const btn = document.getElementById('continue-btn');
                btn.style.display = 'flex';
                btn.onclick = () => window.location.href = paymentData.redirect_url;
                setTimeout(() => window.location.href = paymentData.redirect_url, 5000);
            }
        }

        function showError(title, msg) {
            document.getElementById('loading').classList.add('done');
            document.getElementById('checkout-wrap').style.opacity = '1';
            document.querySelectorAll('.left,.tabs,#tab-qr,#tab-sms').forEach(el => el.style.display = 'none');
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('error-screen').classList.add('show');
            document.querySelector('.right').style.justifyContent = 'center';
        }

        function shadeColor(color, pct) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * pct);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }
    </script>
</body>

</html>
